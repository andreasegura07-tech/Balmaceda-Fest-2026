<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Balmaceda Fest Photobooth</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #111;
  font-family: Arial, sans-serif;
  text-align: center;
  color: white;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px 16px 30px;
}

h2 {
  font-size: 22px;
  margin-bottom: 14px;
  letter-spacing: 1px;
}

#wrapper {
  width: 100%;
  max-width: 420px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}

#container {
  position: relative;
  width: 100%;
  aspect-ratio: 4 / 3;
  border-radius: 12px;
  overflow: hidden;
  background: #000;
}

video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

#frame {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  pointer-events: none;
  z-index: 2;
}

#countdown {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 100px;
  font-weight: bold;
  color: white;
  text-shadow: 3px 3px 12px #000;
  display: none;
  z-index: 3;
}

#thumbnails {
  display: flex;
  gap: 8px;
  justify-content: center;
  width: 100%;
}

#thumbnails img {
  width: 23%;
  aspect-ratio: 4/3;
  object-fit: cover;
  border-radius: 6px;
  border: 2px solid #444;
  opacity: 0.3;
  transition: opacity 0.3s;
  background: #222;
}

#thumbnails img.taken {
  opacity: 1;
  border-color: #ff4081;
}

#btn {
  width: 100%;
  padding: 16px;
  font-size: 20px;
  font-weight: bold;
  border: none;
  border-radius: 14px;
  background: #ff4081;
  color: white;
  cursor: pointer;
  transition: opacity 0.3s, transform 0.1s;
  -webkit-tap-highlight-color: transparent;
}

#btn:active { transform: scale(0.97); }
#btn:disabled { opacity: 0.5; }

#status {
  font-size: 16px;
  min-height: 22px;
  color: #ccc;
}
</style>
</head>
<body>

<h2>📸 Balmaceda Fest</h2>

<div id="wrapper">
  <div id="container">
    <video id="video" autoplay playsinline muted></video>
    <img id="frame" src="marco.png">
    <div id="countdown"></div>
  </div>

  <div id="thumbnails">
    <img id="th0"><img id="th1"><img id="th2"><img id="th3">
  </div>

  <button id="btn" onclick="startSession()">📷 Tomar Fotos</button>
  <div id="status"></div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
const video    = document.getElementById("video");
const statusEl = document.getElementById("status");
const btn      = document.getElementById("btn");

const FRAME_W = 1080;
const FRAME_H = 810;
const STRIP_H = FRAME_H * 4; // 3240

navigator.mediaDevices.getUserMedia({
  video: { facingMode: "user", width: { ideal: 1920 }, height: { ideal: 1080 } }
}).then(stream => {
  video.srcObject = stream;
}).catch(() => {
  statusEl.textContent = "❌ No se pudo acceder a la cámara";
});

const stripFrame = new Image();
stripFrame.crossOrigin = "anonymous";
stripFrame.src = "marco_tira.png";

let photos = [];

function startSession(){
  photos = [];
  for(let i = 0; i < 4; i++){
    const th = document.getElementById("th" + i);
    th.removeAttribute("src");
    th.classList.remove("taken");
  }
  btn.disabled = true;
  statusEl.textContent = "";
  takeSequence();
}

function takeSequence(){
  if(photos.length === 4){
    statusEl.textContent = "✅ Generando tira...";
    createStrip();
    return;
  }
  statusEl.textContent = `Foto ${photos.length + 1} de 4`;
  startCountdown();
}

function startCountdown(){
  let count = 3;
  const cd = document.getElementById("countdown");
  cd.style.display = "block";
  cd.innerHTML = count;
  const timer = setInterval(() => {
    count--;
    if(count > 0){
      cd.innerHTML = count;
    } else {
      clearInterval(timer);
      cd.style.display = "none";
      capture();
      setTimeout(takeSequence, 1000);
    }
  }, 1000);
}

function capture(){
  const canvas = document.getElementById("canvas");
  const ctx    = canvas.getContext("2d");
  canvas.width  = FRAME_W;
  canvas.height = FRAME_H;

  const vw = video.videoWidth;
  const vh = video.videoHeight;
  const targetRatio = FRAME_W / FRAME_H;
  const videoRatio  = vw / vh;

  let sx, sy, sw, sh;
  if(videoRatio > targetRatio){
    sh = vh; sw = vh * targetRatio;
    sx = (vw - sw) / 2; sy = 0;
  } else {
    sw = vw; sh = vw / targetRatio;
    sx = 0; sy = (vh - sh) / 2;
  }

  ctx.drawImage(video, sx, sy, sw, sh, 0, 0, FRAME_W, FRAME_H);

  const dataURL = canvas.toDataURL("image/jpeg", 0.92);
  const idx = photos.length;
  photos.push(dataURL);

  const th = document.getElementById("th" + idx);
  th.src = dataURL;
  th.classList.add("taken");
}

function createStrip(){
  const canvas = document.createElement("canvas");
  const ctx    = canvas.getContext("2d");
  canvas.width  = FRAME_W;
  canvas.height = STRIP_H;

  let loaded = 0;
  photos.forEach((src, i) => {
    const img = new Image();
    img.onload = function(){
      ctx.drawImage(img, 0, i * FRAME_H, FRAME_W, FRAME_H);
      loaded++;
      if(loaded === photos.length){
        const applyFrame = () => {
          ctx.drawImage(stripFrame, 0, 0, FRAME_W, STRIP_H);
          btn.disabled = false;
          statusEl.textContent = "🎉 ¡Descargando tira!";
          download(canvas);
        };
        (stripFrame.complete && stripFrame.naturalWidth > 0)
          ? applyFrame()
          : (stripFrame.onload = applyFrame);
      }
    };
    img.src = src;
  });
}

function download(canvas){
  canvas.toBlob(blob => {
    const url  = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.download = "balmaceda-fest.png";
    link.href = url;
    link.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }, "image/png");
}
</script>
</body>
</html>
