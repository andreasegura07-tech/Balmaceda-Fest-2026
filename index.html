<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Balmaceda Fest Photobooth</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #111;
  font-family: Arial, sans-serif;
  text-align: center;
  color: white;
  padding: 16px 16px 40px;
}

h2 { font-size: 22px; margin-bottom: 14px; letter-spacing: 1px; }

#wrapper {
  width: 100%;
  max-width: 420px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}

#container {
  position: relative;
  width: 100%;
  aspect-ratio: 4 / 3;
  border-radius: 12px;
  overflow: hidden;
  background: #000;
}

video { width: 100%; height: 100%; object-fit: cover; display: block; }

#frame {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  pointer-events: none;
  z-index: 2;
}

#countdown {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 100px;
  font-weight: bold;
  color: white;
  text-shadow: 3px 3px 12px #000;
  display: none;
  z-index: 3;
}

#thumbnails { display: flex; gap: 8px; justify-content: center; width: 100%; }
#thumbnails img {
  width: 23%;
  aspect-ratio: 4/3;
  object-fit: cover;
  border-radius: 6px;
  border: 2px solid #444;
  opacity: 0.3;
  transition: opacity 0.3s;
  background: #222;
}
#thumbnails img.taken { opacity: 1; border-color: #ff4081; }

#btn {
  width: 100%;
  padding: 16px;
  font-size: 20px;
  font-weight: bold;
  border: none;
  border-radius: 14px;
  background: #ff4081;
  color: white;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
#btn:active { transform: scale(0.97); }
#btn:disabled { opacity: 0.5; }

#status { font-size: 16px; min-height: 22px; color: #ccc; }

/* ── GALERÍA ── */
#gallery-section {
  width: 100%;
  max-width: 420px;
  margin: 30px auto 0;
}
#gallery-section h3 {
  font-size: 18px;
  margin-bottom: 14px;
  color: #ff4081;
  letter-spacing: 1px;
}
#gallery-count { font-size: 13px; color: #888; margin-bottom: 12px; }
#gallery {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}
.gallery-item {
  position: relative;
  border-radius: 10px;
  overflow: hidden;
  background: #222;
  cursor: pointer;
}
.gallery-item img {
  width: 100%;
  aspect-ratio: 1080 / 3240;
  object-fit: cover;
  display: block;
}
.gallery-item .dl-btn {
  position: absolute;
  bottom: 6px; right: 6px;
  background: rgba(0,0,0,0.65);
  color: white;
  border: none;
  border-radius: 8px;
  padding: 5px 9px;
  font-size: 18px;
  cursor: pointer;
}

/* ── LIGHTBOX ── */
#lightbox {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.92);
  z-index: 100;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
#lightbox.open { display: flex; }
#lightbox img { max-width: 100%; max-height: 80vh; border-radius: 10px; object-fit: contain; }
#lightbox-actions { display: flex; gap: 12px; margin-top: 16px; }
#lightbox-actions button {
  padding: 12px 24px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}
#lb-download { background: #ff4081; color: white; }
#lb-close    { background: #333; color: white; }
</style>
</head>
<body>

<h2>📸 Balmaceda Fest</h2>

<div id="wrapper">
  <div id="container">
    <video id="video" autoplay playsinline muted></video>
    <img id="frame" src="marco.png">
    <div id="countdown"></div>
  </div>
  <div id="thumbnails">
    <img id="th0"><img id="th1"><img id="th2"><img id="th3">
  </div>
  <button id="btn" onclick="startSession()">📷 Tomar Fotos</button>
  <div id="status"></div>
</div>

<!-- GALERÍA -->
<div id="gallery-section">
  <h3>🎞️ Tiras del evento</h3>
  <div id="gallery-count"></div>
  <div id="gallery"></div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox">
  <img id="lb-img" src="">
  <div id="lightbox-actions">
    <button id="lb-download" onclick="downloadLightbox()">⬇️ Descargar</button>
    <button id="lb-close" onclick="closeLightbox()">✕ Cerrar</button>
  </div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
const video    = document.getElementById("video");
const statusEl = document.getElementById("status");
const btn      = document.getElementById("btn");
const gallery  = document.getElementById("gallery");
const galCount = document.getElementById("gallery-count");

const FRAME_W = 1080;
const FRAME_H = 810;
const STRIP_H = FRAME_H * 4; // 3240

let lightboxURL = "";

navigator.mediaDevices.getUserMedia({
  video: { facingMode: "user", width: { ideal: 1920 }, height: { ideal: 1080 } }
}).then(stream => {
  video.srcObject = stream;
}).catch(() => {
  statusEl.textContent = "❌ No se pudo acceder a la cámara";
});

const stripFrame = new Image();
stripFrame.crossOrigin = "anonymous";
stripFrame.src = "marco_tira.png";

let photos = [];

function startSession(){
  photos = [];
  for(let i = 0; i < 4; i++){
    const th = document.getElementById("th" + i);
    th.removeAttribute("src");
    th.classList.remove("taken");
  }
  btn.disabled = true;
  statusEl.textContent = "";
  takeSequence();
}

function takeSequence(){
  if(photos.length === 4){
    statusEl.textContent = "✅ Generando tira...";
    createStrip();
    return;
  }
  statusEl.textContent = `Foto ${photos.length + 1} de 4`;
  startCountdown();
}

function startCountdown(){
  let count = 3;
  const cd = document.getElementById("countdown");
  cd.style.display = "block";
  cd.innerHTML = count;
  const timer = setInterval(() => {
    count--;
    if(count > 0){
      cd.innerHTML = count;
    } else {
      clearInterval(timer);
      cd.style.display = "none";
      capture();
      setTimeout(takeSequence, 1000);
    }
  }, 1000);
}

function capture(){
  const canvas = document.getElementById("canvas");
  const ctx    = canvas.getContext("2d");
  canvas.width  = FRAME_W;
  canvas.height = FRAME_H;

  const vw = video.videoWidth;
  const vh = video.videoHeight;
  const targetRatio = FRAME_W / FRAME_H;
  const videoRatio  = vw / vh;

  let sx, sy, sw, sh;
  if(videoRatio > targetRatio){
    sh = vh; sw = vh * targetRatio;
    sx = (vw - sw) / 2; sy = 0;
  } else {
    sw = vw; sh = vw / targetRatio;
    sx = 0; sy = (vh - sh) / 2;
  }

  ctx.drawImage(video, sx, sy, sw, sh, 0, 0, FRAME_W, FRAME_H);
  const dataURL = canvas.toDataURL("image/jpeg", 0.92);
  const idx = photos.length;
  photos.push(dataURL);

  const th = document.getElementById("th" + idx);
  th.src = dataURL;
  th.classList.add("taken");
}

function createStrip(){
  const canvas = document.createElement("canvas");
  const ctx    = canvas.getContext("2d");
  canvas.width  = FRAME_W;
  canvas.height = STRIP_H;
  let loaded = 0;

  photos.forEach((src, i) => {
    const img = new Image();
    img.onload = function(){
      ctx.drawImage(img, 0, i * FRAME_H, FRAME_W, FRAME_H);
      loaded++;
      if(loaded === photos.length){
        const applyFrame = () => {
          ctx.drawImage(stripFrame, 0, 0, FRAME_W, STRIP_H);
          canvas.toBlob(blob => {
            const url = URL.createObjectURL(blob);
            addToGallery(url);
            downloadBlob(blob, `balmaceda-${Date.now()}.png`);
            btn.disabled = false;
            statusEl.textContent = "🎉 ¡Tira guardada!";
          }, "image/png");
        };
        (stripFrame.complete && stripFrame.naturalWidth > 0)
          ? applyFrame()
          : (stripFrame.onload = applyFrame);
      }
    };
    img.src = src;
  });
}

function addToGallery(url){
  const count = gallery.children.length + 1;
  galCount.textContent = `${count} tira${count > 1 ? "s" : ""} tomada${count > 1 ? "s" : ""}`;

  const item = document.createElement("div");
  item.className = "gallery-item";

  const img = document.createElement("img");
  img.src = url;
  img.onclick = () => openLightbox(url);

  const dlBtn = document.createElement("button");
  dlBtn.className = "dl-btn";
  dlBtn.textContent = "⬇️";
  dlBtn.onclick = e => {
    e.stopPropagation();
    fetch(url).then(r => r.blob()).then(b => downloadBlob(b, `balmaceda-${Date.now()}.png`));
  };

  item.appendChild(img);
  item.appendChild(dlBtn);
  gallery.prepend(item);
}

function openLightbox(url){
  lightboxURL = url;
  document.getElementById("lb-img").src = url;
  document.getElementById("lightbox").classList.add("open");
}
function closeLightbox(){
  document.getElementById("lightbox").classList.remove("open");
}
function downloadLightbox(){
  fetch(lightboxURL).then(r => r.blob()).then(b => downloadBlob(b, `balmaceda-${Date.now()}.png`));
}
function downloadBlob(blob, filename){
  const url  = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.download = filename;
  link.href = url;
  link.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}
</script>
</body>
</html>
